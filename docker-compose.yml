services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tvbot
      POSTGRES_PASSWORD: tvbot
      POSTGRES_DB: tvbot
    ports: ["5432:5432"]
    volumes:
      - ./.data/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tvbot -d tvbot"]
      interval: 2s
      timeout: 5s
      retries: 30

  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BOT_MODE: ${BOT_MODE:-dry_run}
      DATABASE_URL: postgres://tvbot:tvbot@postgres:5432/tvbot?sslmode=disable
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-please-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-please-change-me-please-change-me}
      HTTP_LISTEN: 0.0.0.0:8080
      LOG_LEVEL: info
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
    ports: ["8080:8080"]
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped
