{{ define "base" }}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tvbot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/htmx.min.js"></script>
  <style>
    .tip { position: relative; display: inline-block; margin-left: 4px; cursor: help; vertical-align: middle; }
    .tip-mark { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 9999px; background: #e5e7eb; color: #4b5563; font-size: 10px; font-weight: 700; line-height: 1; border: 1px solid #9ca3af; }
    .tip-mark:hover { background: #d1d5db; }
    .tip-panel { visibility: hidden; opacity: 0; position: absolute; z-index: 50; left: 22px; top: -4px; background: #111827; color: #fff; font-size: 12px; border-radius: 6px; padding: 8px 10px; width: 20rem; max-width: 24rem; box-shadow: 0 6px 16px rgba(0,0,0,.25); white-space: normal; font-weight: 400; line-height: 1.5; transition: opacity .12s; text-align: left; }
    .tip:hover .tip-panel, .tip:focus-within .tip-panel { visibility: visible; opacity: 1; }
    .tip-panel code { background: rgba(255,255,255,0.15); padding: 0 4px; border-radius: 3px; font-size: 11px; }
    .tip-panel a { color: #93c5fd; text-decoration: underline; }
    .tip-panel b, .tip-panel strong { color: #fde68a; }
    .tip-panel p { margin: 0 0 4px 0; }
    .tip-panel p:last-child { margin-bottom: 0; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-gray-900 text-white">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex space-x-6 items-center">
        <a href="/stats" class="font-bold hover:text-blue-300">tvbot</a>
        <a href="/stats" class="hover:text-blue-300">收益</a>
        <a href="/positions" class="hover:text-blue-300">持仓</a>
        <a href="/strategies" class="hover:text-blue-300">策略</a>
        <a href="/signals" class="hover:text-blue-300">信号</a>
        <a href="/eval" class="hover:text-blue-300">评估</a>
        <a href="/system" class="hover:text-blue-300">系统</a>
        <a href="/settings" class="hover:text-blue-300">配置</a>
      </div>
      <form method="POST" action="/logout" class="inline">
        <button class="text-sm hover:text-red-300">登出</button>
      </form>
    </div>
  </nav>

  {{ template "status_bar" .Status }}

  {{ template "news_banner" .NewsBanner }}

  <main class="max-w-7xl mx-auto px-4 py-6">
    {{ template "content" . }}
  </main>
</body>
</html>
{{ end }}
